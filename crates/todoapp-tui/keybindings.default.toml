# Default todoapp-tui keybindings. Copy to ~/.config/tda/keybindings.toml (or
# $TDA_KEYMAP) and edit to retune — only the actions you list are overridden,
# each override replaces that action's whole key list.
quit = ["q", "esc"]
toggle_help = ["?"]
move_down = ["j", "down"]
move_up = ["k", "up"]
jump_first = ["g", "home"]
jump_last = ["G", "end"]
expand = ["l", "right", "enter"]
collapse = ["h", "left"]
add_sibling = ["a"]
add_root = ["A"]
edit_title = ["e"]
view_detail = ["v"]
cycle_status = ["space"]
claim = ["c"]
reorder_down = ["alt+down"]
reorder_up = ["alt+up"]
reparent_in = ["alt+right"]
reparent_out = ["alt+left"]
search = ["/"]
what_next = ["n"]
select = ["V"]
yank = ["y"]
