# Default todoapp-tui config. Copy to ~/.config/tda/tui.toml and edit to
# retune — only the tables/fields/actions you set are overridden, unmentioned
# ones keep their embedded default.
[behavior]
# Keep the add-task dialog open after Alt+Enter, so you can keep typing
# task after task without pressing `a` again. reparent_in/reparent_out
# (see [keybindings] below, default alt+right/alt+left) work inside the
# add dialog too, whether or not this is on — they shift the depth of the
# task just created before you type the next one.
chain_add = false

[columns]
# "id" shows the shortest unique prefix (git/jj-style abbreviation), usable
# to target a task from the future CLI.
order = ["status", "due", "eta", "assignee", "estimate", "elapsed", "tags", "id"]

[schedule]
# Work calendar used to project the `eta` column: hours of capacity per work
# day, and how many days per week (Mon-anchored) count as workdays.
hours_per_day = 8.0
days_per_week = 5

[status]
# Which statuses are usable and the order `space` cycles through them in.
# Drop entries here to hide a status you never use ("draft" is excluded by
# default; add it back, e.g. ["draft", "todo", "wip", "paused", "done"], if
# you want the capture/refine stage).
enabled = ["todo", "wip", "paused", "done"]
# Symbol set for the animated `wip` spinner; see throbber-widgets-tui's
# symbols module for the full list (ascii, braille_six, braille_eight, ...).
spinner_set = "braille_eight"
spinner_interval_ms = 100

[status.glyphs]
# Static icon per status; `wip` has none here — it's always spinner-driven.
draft = "○"
todo = "◇"
paused = "⏸"
done = "✔"

[styles]
# Fg color for the status glyph/icon only — every status needs one. Any
# string ratatui::style::Color accepts: named ("yellow", "darkgray"), ANSI
# index ("10"), or hex ("#ff0000").
glyph_colors = { draft = "darkgray", todo = "reset", wip = "yellow", paused = "cyan", done = "green" }
# Sparse per-status *text* override: "color" or "color,modifier[,modifier...]".
# Statuses not listed here render with plain/default text — only the glyph
# then carries their identity color. Done is deliberately muted so remaining
# (non-Done) work visually stands out more than what's already finished.
text_styles = { done = "darkgray,crossed_out" }
# Layered on top of a row's text style when that row summarizes a subtree
# (has children), so aggregate rows read as distinct from a leaf task at the
# same status.
aggregate_modifier = "dim"
# The eta column's color when the projected finish overruns the due date.
overdue_color = "red"
# The cursor/selected row's highlight (tree and list views).
selected_bg = "blue"
selected_fg = "white"
selected_modifier = "bold"

[keybindings]
# action = ["chord", ...] — each override replaces that action's whole key list.
quit = ["q", "esc"]
toggle_help = ["?"]
move_down = ["j", "down"]
move_up = ["k", "up"]
jump_first = ["g", "home"]
jump_last = ["G", "end"]
expand = ["l", "right", "enter"]
collapse = ["h", "left"]
add_sibling = ["a"]
add_root = ["A"]
edit_title = ["e"]
view_detail = ["v"]
cycle_status = ["space"]
claim = ["c"]
assign = ["s"]
reorder_down = ["alt+down"]
reorder_up = ["alt+up"]
reparent_in = ["alt+right"]
reparent_out = ["alt+left"]
search = ["/"]
what_next = ["n"]
select = ["V"]
yank = ["y"]
delete = ["d"]
